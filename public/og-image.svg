<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fff7ed"/>

  <!-- Orange left accent bar -->
  <rect width="14" height="630" fill="#f97316"/>

  <!-- Decorative circles right -->
  <circle cx="1010" cy="315" r="360" fill="#f97316" fill-opacity="0.07"/>
  <circle cx="1010" cy="315" r="230" fill="#f97316" fill-opacity="0.10"/>

  <!-- Leaf icon centered on right -->
  <g transform="translate(1010, 300) scale(10) translate(-12, -12)" stroke="#f97316" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.25 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z" fill="#f97316" fill-opacity="0.35"/>
